name: GitHub Portfolio Audit
description: Audit verifiable profile and repository quality evidence without vanity metrics.
author: Sami El Akkad

branding:
  icon: check-circle
  color: green

inputs:
  owner:
    description: GitHub account login; defaults to the current repository owner.
    required: false
  token:
    description: Read-only GitHub token used to avoid the anonymous API rate limit.
    required: false
  min-score:
    description: Fail the step when the overall score is lower than this value.
    required: false
    default: "70"
  repository:
    description: Optional single repository name to audit.
    required: false

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install auditor
      shell: bash
      run: python -m pip install "$GITHUB_ACTION_PATH"
    - name: Audit portfolio evidence
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        INPUT_OWNER: ${{ inputs.owner }}
        INPUT_REPOSITORY: ${{ inputs.repository }}
        INPUT_MIN_SCORE: ${{ inputs['min-score'] }}
      run: |
        owner="${INPUT_OWNER:-$GITHUB_REPOSITORY_OWNER}"
        repo_args=()
        if [[ -n "$INPUT_REPOSITORY" ]]; then
          repo_args=(--repo "$INPUT_REPOSITORY")
        fi
        set +e
        github-portfolio-audit "$owner" \
          "${repo_args[@]}" \
          --format markdown \
          --output portfolio-audit.md \
          --min-score "$INPUT_MIN_SCORE"
        status=$?
        set -e
        if [[ -f portfolio-audit.md ]]; then
          cat portfolio-audit.md >> "$GITHUB_STEP_SUMMARY"
        else
          echo "Portfolio audit failed before producing a report." >> "$GITHUB_STEP_SUMMARY"
        fi
        exit "$status"
